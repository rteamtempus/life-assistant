@if (pwa.updateReady()) {
  <div class="fixed inset-x-0 bottom-0 z-50 mx-auto max-w-md p-4">
    <div
      class="flex items-center justify-between gap-3 rounded-2xl bg-ink px-4 py-3 text-white shadow-lg"
      role="status"
    >
      <span class="text-sm">a fresh version is ready.</span>
      <button
        type="button"
        (click)="pwa.reload()"
        class="rounded-full bg-calm px-4 py-1.5 text-sm font-medium text-white transition active:scale-95"
      >
        reload
      </button>
    </div>
  </div>
}

<main class="mx-auto min-h-screen w-full max-w-md px-5">
  <router-outlet />
</main>
